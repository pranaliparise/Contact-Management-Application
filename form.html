<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${contact.id == null} ? 'Add Contact' : 'Edit Contact'">Contact Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f3f3f3;
        }
        form {
            width: 400px;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: white;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        .error {
            color: red;
            font-size: 0.85em;
            margin-bottom: 10px;
        }
        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<form th:action="${contact.id == null} ? @{/contacts/save} : @{/contacts/update/{id}(id=${contact.id})}"
      th:object="${contact}" method="post">

    <h2 style="text-align: center;" th:text="${contact.id == null} ? 'Add Contact' : 'Edit Contact'"></h2>

    <!-- First Name -->
    <label for="firstName">First Name</label>
    <input type="text" th:field="*{firstName}" id="firstName" required />
    <div th:if="${#fields.hasErrors('firstName')}" class="error" th:errors="*{firstName}"></div>

    <!-- Last Name -->
    <label for="lastName">Last Name</label>
    <input type="text" th:field="*{lastName}" id="lastName" required />
    <div th:if="${#fields.hasErrors('lastName')}" class="error" th:errors="*{lastName}"></div>

    <!-- Address -->
    <label for="address">Address</label>
    <input type="text" th:field="*{address}" id="address" required />
    <div th:if="${#fields.hasErrors('address')}" class="error" th:errors="*{address}"></div>

    <!-- Email -->
    <label for="email">Email</label>
    <input type="email" th:field="*{email}" id="email" required />
    <div th:if="${#fields.hasErrors('email')}" class="error" th:errors="*{email}"></div>

    <!-- Phone Number -->
    <label for="phoneNumber">Phone Number</label>
    <input type="text" th:field="*{phoneNumber}" id="phoneNumber" required />
    <div th:if="${#fields.hasErrors('phoneNumber')}" class="error" th:errors="*{phoneNumber}"></div>

    <button type="submit">Submit</button>
</form>

</body>
</html>
